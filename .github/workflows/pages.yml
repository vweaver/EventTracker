name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/event-frequency-recorder-XoDYS
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The app is pure static files (no build step per TECH_SPEC.md).
          # Publish the repo root. Docs (PRD.md, TECH_SPEC.md, CLAUDE.md)
          # are not served as HTML, so they don't clutter the site.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
